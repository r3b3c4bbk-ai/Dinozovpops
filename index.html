<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinozov Pops | Catálogo Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f1e9; color: #5a4033; font-family: sans-serif; }
        .hero-section { background-image: linear-gradient(rgba(255,255,255,0.4), rgba(255,255,255,0.4)), url('background.png'); background-size: cover; background-position: center; min-height: 300px; display: flex; align-items: center; justify-content: center; }
        .glass-card { background: rgba(255,255,255,0.75); backdrop-filter: blur(10px); border-radius: 2rem; padding: 2rem; }
        .tab-btn { transition: all 0.3s; border-bottom: 3px solid transparent; }
        .tab-btn.active { border-bottom: 3px solid #5a4033; color: #5a4033; font-weight: 800; background: white; }
        .badge { position: absolute; top: 15px; right: 15px; padding: 5px 12px; border-radius: 20px; font-size: 10px; font-weight: 800; text-transform: uppercase; z-index: 10; }
    </style>
</head>
<body>

    <nav class="bg-white p-4 shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <img src="logo.png" class="w-10 h-10 rounded-full border border-[#5a4033]" onerror="this.src='https://via.placeholder.com/50'">
                <h1 class="text-lg font-black tracking-tighter uppercase">Dinozov Pops</h1>
            </div>
            <div class="flex space-x-4">
                <i class="fas fa-search"></i>
                <i class="fas fa-shopping-bag"></i>
            </div>
        </div>
    </nav>

    <div class="bg-gray-100 border-b sticky top-[64px] z-40 overflow-x-auto">
        <div class="container mx-auto flex whitespace-nowrap">
            <button onclick="filtrar('Todos')" class="tab-btn active p-4 flex items-center gap-2 text-gray-500 uppercase text-xs font-bold" id="btn-Todos">
                <i class="fas fa-th-large"></i> Todos
            </button>
            <button onclick="filtrar('Edicion Limitada')" class="tab-btn p-4 flex items-center gap-2 text-gray-500 uppercase text-xs font-bold" id="btn-Limitada">
                <i class="fas fa-crown"></i> Edición Limitada
            </button>
            <button onclick="filtrar('Exclusivos')" class="tab-btn p-4 flex items-center gap-2 text-gray-500 uppercase text-xs font-bold" id="btn-Exclusivos">
                <i class="fas fa-star"></i> Exclusivos
            </button>
            <button onclick="filtrar('Nuevos Lanzamientos')" class="tab-btn p-4 flex items-center gap-2 text-gray-500 uppercase text-xs font-bold" id="btn-Nuevos">
                <i class="fas fa-fire"></i> Nuevos
            </button>
            <button onclick="filtrar('Pre-ventas')" class="tab-btn p-4 flex items-center gap-2 text-gray-500 uppercase text-xs font-bold" id="btn-Pre">
                <i class="fas fa-clock"></i> Pre-ventas
            </button>
        </div>
    </div>

    <main class="container mx-auto py-10 px-6">
        <div id="contenedor-productos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <script>
        const SHEET_ID = '1fgUMVjf90uHRzg71C7yVTH3molwf76Wl3_r0rZ5g1zk';
        const FULL_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
        let todosLosProductos = [];

        async function cargarDatos() {
            try {
                const res = await fetch(FULL_URL);
                const text = await res.text();
                const json = JSON.parse(text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1));
                todosLosProductos = json.table.rows.filter((r, i) => i > 0 && r.c[0]);
                filtrar('Todos');
            } catch (e) { console.error(e); }
        }

        function filtrar(categoria) {
            // Actualizar botones
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            const idBtn = categoria.includes('Limitada') ? 'btn-Limitada' : 
                          categoria.includes('Exclusivos') ? 'btn-Exclusivos' :
                          categoria.includes('Nuevos') ? 'btn-Nuevos' :
                          categoria.includes('Pre') ? 'btn-Pre' : 'btn-Todos';
            document.getElementById(idBtn).classList.add('active');

            const contenedor = document.getElementById('contenedor-productos');
            contenedor.innerHTML = '';

            const productosFiltrados = categoria === 'Todos' 
                ? todosLosProductos 
                : todosLosProductos.filter(p => p.c[5] && p.c[5].v === categoria);

            productosFiltrados.forEach(p => {
                const nombre = p.c[0].v;
                const precio = p.c[1] ? (p.c[1].f || '$' + p.c[1].v) : "$0";
                const estado = p.c[2] ? p.c[2].v : "Disponible";
                const img = p.c[3] ? p.c[3].v : "https://via.placeholder.com/300";
                const wa = p.c[4] ? p.c[4].v : "#";
                
                contenedor.innerHTML += `
                    <div class="bg-white rounded-[2rem] shadow-lg p-6 text-center border border-gray-100">
                        <div class="bg-gray-50 rounded-2xl p-4 mb-4 relative">
                            <span class="badge text-white ${estado.includes('Stock') ? 'bg-green-500' : 'bg-orange-400'}">${estado}</span>
                            <img src="${img}" class="h-48 mx-auto object-contain">
                        </div>
                        <h3 class="font-bold text-sm uppercase mb-2">${nombre}</h3>
                        <p class="text-xl font-black text-[#25D366] mb-4">${precio}</p>
                        <a href="${wa}" class="block bg-[#25D366] text-white py-3 rounded-xl font-bold uppercase text-xs">
                            <i class="fab fa-whatsapp"></i> Apartar
                        </a>
                    </div>
                `;
            });
        }
        cargarDatos();
    </script>
</body>
</html>
